<!doctype html><html lang="de"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gesundheitsakte aktualisieren</title><style>body{font-family:system-ui;background:#eef7f8;padding:25px}.box{max-width:580px;margin:40px auto;background:white;padding:25px;border-radius:20px}button{padding:12px 18px;border:0;border-radius:12px;background:#0b7285;color:white;font-weight:700}</style><div class="box"><h1>Gesundheitsakte 3.3.8 wird geladen</h1><p id="s">Alte Programmdateien und Service-Worker werden vollständig entfernt. Gesundheitsdaten und Originalbelege bleiben erhalten.</p><button id="retry" hidden>Erneut versuchen</button></div><script>
(async()=>{const status=document.getElementById("s");try{
 if("serviceWorker" in navigator){for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister()}
 if("caches" in window){for(const k of await caches.keys())await caches.delete(k)}
 sessionStorage.setItem("ga_updated_to","3.3.8");
 status.textContent="Bereinigung abgeschlossen. Version 3.3.8 wird ohne alten Programm-Cache geöffnet.";
 setTimeout(()=>location.replace(`./index.html?v=3.3.8&fresh=${Date.now()}`),1000)
}catch(e){status.textContent=`Aktualisierung fehlgeschlagen: ${e.message}`;const b=document.getElementById("retry");b.hidden=false;b.onclick=()=>location.reload()}})();
</script></html>
