<!doctype html><html lang="de"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gesundheitsakte aktualisieren</title><style>body{font-family:system-ui;background:#eef7f8;padding:25px}.box{max-width:580px;margin:40px auto;background:white;padding:25px;border-radius:20px}</style><div class="box"><h1>Gesundheitsakte 3.1 wird geladen</h1><p id="s">Alte Programm-Caches werden entfernt. Gesundheitsdaten bleiben erhalten.</p></div><script>(async()=>{try{if("serviceWorker"in navigator)for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister();if("caches"in window)for(const k of await caches.keys())await caches.delete(k);document.getElementById("s").textContent="Bereinigung abgeschlossen. Neue Version wird geöffnet.";setTimeout(()=>location.replace("./index.html?v=3.1.0&fresh="+Date.now()),900)}catch(e){document.getElementById("s").textContent=e.message}})()</script></html>
