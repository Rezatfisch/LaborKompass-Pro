<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gesundheitsakte aktualisieren</title>
<style>
body{font-family:Arial,sans-serif;background:#eef6f8;color:#17232b;margin:0;padding:24px}
.card{max-width:560px;margin:30px auto;background:white;padding:24px;border-radius:20px;box-shadow:0 10px 30px #1232}
h1{color:#0f766e}.status{padding:14px;border-radius:12px;background:#e6fffb;margin:16px 0;font-weight:700}
small{display:block;line-height:1.5;color:#52616b}
</style>
</head>
<body><div class="card">
<h1>Gesundheitsakte wird aktualisiert</h1>
<div id="status" class="status">Alte App-Caches werden entfernt …</div>
<small>Gespeicherte Gesundheitsdaten werden nicht gelöscht. Entfernt werden nur Service Worker und zwischengespeicherte Programmdateien.</small>
</div>
<script>
(async()=>{
 const status=document.getElementById("status");
 try{
  if("serviceWorker" in navigator){
   const regs=await navigator.serviceWorker.getRegistrations();
   for(const reg of regs)await reg.unregister();
  }
  if("caches" in window){
   const names=await caches.keys();
   await Promise.all(names.map(name=>caches.delete(name)));
  }
  status.textContent="Cache wurde bereinigt. Neue Version wird geladen …";
  setTimeout(()=>location.replace("./index.html?v=2.1.1&fresh="+Date.now()),1200);
 }catch(error){
  status.textContent="Bereinigung teilweise fehlgeschlagen: "+error.message+". Die neue Seite wird trotzdem geöffnet.";
  setTimeout(()=>location.replace("./index.html?v=2.1.1&fresh="+Date.now()),2500);
 }
})();
</script></body></html>
